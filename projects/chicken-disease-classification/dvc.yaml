# DVC Pipeline Tanımı (Data Version Control - Veri Versiyonlama ve Pipeline Otomasyonu)
# Bu dosya, makine öğrenmesi projesinin tüm aşamalarını (data ingestion, model hazırlama, eğitim, değerlendirme)
# otomatik olarak çalıştırmak ve her aşamanın girdi/çıktılarını takip etmek için kullanılır.
# DVC, her aşamayı (stage) izler ve sadece değişen aşamaları yeniden çalıştırarak zaman kazandırır.

stages:
  data_ingestion:
    cmd: python src/cnnClassifier/pipeline/stage_01_data_ingestion.py
    deps:
      - src/cnnClassifier/pipeline/stage_01_data_ingestion.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion/Chicken-fecal-images

  prepare_base_model:
    cmd: python src/cnnClassifier/pipeline/stage_02_prepare_base_model.py
    deps:
      - src/cnnClassifier/pipeline/stage_02_prepare_base_model.py
      - config/config.yaml
      - params.yaml
    params:
      - IMAGE_SIZE
      - INCLUDE_TOP
      - CLASSES
      - WEIGHTS
      - LEARNING_RATE
    outs:
      - artifacts/prepare_base_model/base_model.h5
      - artifacts/prepare_base_model/base_model_updated.h5

  training:
    cmd: python src/cnnClassifier/pipeline/stage_03_model_training.py
    deps:
      - src/cnnClassifier/pipeline/stage_03_model_training.py
      - config/config.yaml
      - params.yaml
      - artifacts/data_ingestion/Chicken-fecal-images
      - artifacts/prepare_base_model/base_model_updated.h5
    params:
      - IMAGE_SIZE
      - EPOCHS
      - BATCH_SIZE
      - AUGMENTATION
    outs:
      - artifacts/training/model.h5

  evaluation:
    cmd: python src/cnnClassifier/pipeline/stage_04_model_evaluation.py
    deps:
      - src/cnnClassifier/pipeline/stage_04_model_evaluation.py
      - config/config.yaml
      - params.yaml
      - artifacts/training/model.h5
      - artifacts/data_ingestion/Chicken-fecal-images
    params:
      - IMAGE_SIZE
      - BATCH_SIZE
    metrics:
      - scores.json:
          cache: false